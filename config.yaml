api:
  api_key:
  base_url: https://my-api.plantnet.org/v2/identify/all
  rate_limit_seconds: 0.5
classification:
  confidence_tiers:
    tier1_min_conf: 0.8
    tier1_min_gap: 0.4
    tier2_min_conf: 0.6
    tier2_min_gap: 0.2
    tier3_min_conf: 0.4
    tier4_min_conf: 0.2
  top_k: 5
deduplication:
  analysis_thresholds:
  - 0.9
  - 0.93
  - 0.95
  - 0.97
  - 0.99
  primary_threshold: 0.95
detection:
  flower_green_hue_range:
  - 35
  - 85
  flower_saturation_threshold: 80
  min_roi_area_fraction: 0.01
  roi_padding: 20
  yolo_confidence: 0.25
  yolo_model: yolov8m.pt
features:
  image_size: 224
  normalization_mean:
  - 0.485
  - 0.456
  - 0.406
  normalization_std:
  - 0.229
  - 0.224
  - 0.225
paths:
  class_idx_to_species: models/class_idx_to_species_id.json
  cropped_rois: data/cropped_rois
  csvs: data/csvs
  features: data/features
  figures: outputs/figures
  metadata: models/plantnet300K_metadata.json
  model_weights: models/wide_resnet50_2_weights_best_acc.tar
  raw_images: data/raw_images
  species_id_to_name: models/plantnet300K_species_id_2_name.json
  tables: outputs/tables
project:
  name: plantnet-field-identification
  seed: 42
visualization:
  dbscan_eps: 0.2
  dbscan_min_samples: 5
  figure_dpi: 300
  tsne_perplexity: 30
  umap_min_dist: 0.1
  umap_n_neighbors: 15
